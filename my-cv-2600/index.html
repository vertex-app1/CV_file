        <style>
          * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }
          body {
            background: linear-gradient(135deg, #0d0e10 0%, #181a1f 50%, #0a0b0d 100%);
            font-family: 'Poppins', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
          }
          
          /* Dynamic translation switch */
          .lang-switcher {
            position: absolute;
            top: 20px;
            right: 20px;
            left: auto;
            z-index: 100;
          }
          .lang-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
          }
          .lang-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #60a5fa;
          }

          

          header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 80px 20px 30px;
            text-align: center;
            position: relative;
          }
          .profile-container {
            position: relative;
            width: 154px;
            height: 154px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
          }
          .profile-container::before {
            content: "";
            position: absolute;
            width: 170px;
            height: 170px;
            border-radius: 50%;
            background: conic-gradient(#60a5fa, #1d4ed8, #60a5fa);
            animation: rotateBorder 6s linear infinite;
            z-index: 0;
          }
          @keyframes rotateBorder { to { transform: rotate(360deg); } }
          .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            position: relative;
            z-index: 1;
            border: 4px solid #1a1f15;
            background: #2b2e25;
          }
          .profile-name {
            font-size: 42px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
          }
          .profile-title {
            color: #60a5fa;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-top: 2px;
          }
          
          /* Audio Bio */
          .audio-player {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 18px;
            border-radius: 30px;
            width: 240px;
            margin: 12px 0;
          }
          .play-btn {
            background: #60a5fa;
            border: none;
            color: #1a1f15;
            font-size: 14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.15s;
          }
          .play-btn:hover { transform: scale(1.05); }
          .player-label {
            font-size: 11px;
            font-weight: 600;
            color: #60a5fa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
          }
          .progress-container {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.15);
            border-radius: 5px;
            overflow: hidden;
            cursor: pointer;
            position: relative;
          }
          .progress {
            height: 100%;
            width: 0%;
            background: #60a5fa;
            border-radius: 5px;
          }

          nav.navigation ul {
            display: flex;
            list-style: none;
            gap: 1.5rem;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 14px;
          }
          nav.navigation a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.5px;
            transition: color 0.2s;
          }
          nav.navigation a:hover { color: #60a5fa; }

          hr {
            border: none;
            height: 1px;
            width: 60%;
            margin: 40px auto;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
          }

          .glass-box {
            width: 90%;
            max-width: 720px;
            margin: 0 auto 40px;
            padding: 40px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: left;
          }
          .glass-box h2 {
            font-size: 14px;
            font-weight: 800;
            color: #60a5fa;
            margin-bottom: 18px;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 8px;
          }
           .about-text {
            line-height: 1.8;
            color: #d8e2dc;
            font-size: 15px;
            text-align: left;
            white-space: pre-wrap;
          }

          /* Social link badges */
          .social-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 15px;
            max-width: 500px;
          }
          .social-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 6px 14px;
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.2s;
            font-weight: 600;
          }
          .social-link:hover {
            color: #60a5fa;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-1px);
          }

          /* Skills grid layout */
          .skills-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin-top: 15px;
          }
          .skill-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #d8e2dc;
            font-weight: 500;
          }
          .skill-bullet {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #60a5fa;
            flex-shrink: 0;
          }
          
          /* Projects grid */
          .projects-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            text-align: left;
          }
          .project {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 20px;
            border-radius: 12px;
            transition: transform 0.2s, background 0.2s, border-color 0.2s;
          }
          .project:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.05);
            border-color: #60a5fa;
          }
          .project-title {
            color: #60a5fa;
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 8px;
          }
          .project-desc {
            font-size: 13.5px;
            color: #cdd5cb;
            line-height: 1.6;
          }

          footer {
            margin-top: auto;
            text-align: center;
            padding: 40px 20px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
          }
          footer a {
            color: #60a5fa;
            text-decoration: none;
            font-weight: 600;
          }
          footer a:hover { text-decoration: underline; }

          /* Specialization - Developer GitHub section styling */
          .github-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
            margin-top: 15px;
          }
          .github-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-decoration: none;
            color: inherit;
            text-align: left;
          }
          .github-card:hover {
            transform: translateY(-3px);
            background: rgba(255, 255, 255, 0.05);
            border-color: #60a5fa;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
          }
          .github-card-title {
            color: #60a5fa;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
          }
          .github-card-desc {
            font-size: 13px;
            color: #b0b5aa;
            line-height: 1.5;
            flex-grow: 1;
          }
          .github-card-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
          }
          .github-star-icon {
            display: inline-flex;
            align-items: center;
            gap: 3px;
          }

          /* Specialization - Designer Bento Gallery styling */
          .designer-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 15px;
          }
          .designer-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.25s ease;
            position: relative;
            cursor: pointer;
            text-align: left;
          }
          .designer-card:hover {
            transform: scale(1.02);
            border-color: #60a5fa;
          }
          .designer-img-placeholder {
            height: 140px;
            background: linear-gradient(135deg, #1d4ed833, rgba(255,255,255,0.05));
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
          }
          .designer-card-info {
            padding: 12px;
          }
          .designer-card-title {
            font-size: 13.5px;
            font-weight: 700;
            color: #f0f3e8;
          }
          .designer-card-tag {
            font-size: 10px;
            text-transform: uppercase;
            color: #60a5fa;
            font-weight: 700;
            margin-top: 2px;
            letter-spacing: 0.5px;
          }

          @media (max-width: 600px) {
            header { padding: 40px 15px 20px; }
            .profile-name { font-size: 32px; }
            .glass-box { padding: 24px 20px; margin-bottom: 30px; }
            .profile-container { width: 124px; height: 124px; }
            .profile-container::before { width: 138px; height: 138px; }
            .profile-img { width: 120px; height: 120px; }
          }
        </style>
      </head>
      <body>
        
        <div class="mesh-layer" style="position:fixed; inset:0; z-index:-1; background: radial-gradient(circle at 30% 30%, rgba(96, 165, 250, 0.2) 0%, transparent 60%), radial-gradient(circle at 70% 80%, rgba(29, 78, 216, 0.25) 0%, transparent 60%); filter: blur(50px);"></div>
      

        <div class="lang-switcher">
          <a href="?lang=ar" class="lang-btn">
            🌐 العربية
          </a>
        </div>

                        '<span>' + (repo.language || "TypeScript") + '</span>' +
                        '<span class="github-star-icon">' +
                          '<svg style="width:12px; height:12px; fill:rgba(255,255,255,0.5);" viewBox="0 0 24 24"><path d="M12 .587l3.668 7.431 8.2 1.191-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.857 1.4-8.168L.132 9.209l8.2-1.191L12 .587z"/></svg>' +
